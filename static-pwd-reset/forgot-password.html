<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .card {
      background: #fff;
      padding: 30px;
      width: 100%;
      max-width: 380px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }

    #message {
      margin-top: 15px;
      font-size: 14px;
    }

    .error {
      color: #e53e3e;
    }

    .success {
      color: #38a169;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Reset Your Password</h2>

    <input
      type="password"
      id="password"
      placeholder="Enter new password"
    />

    <button onclick="resetPassword()">Reset Password</button>

    <p id="message"></p>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get("token");

    async function resetPassword() {
      const password = document.getElementById("password").value;
      const messageEl = document.getElementById("message");

      if (!token) {
        messageEl.textContent = "Invalid or expired reset link";
        messageEl.className = "error";
        return;
      }

      if (password.length < 6) {
        messageEl.textContent = "Password must be at least 6 characters";
        messageEl.className = "error";
        return;
      }
      try {
        const response = await fetch(`${FRONTEND_APP_URL}/auth/reset-password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            token: token,
            new_password: password
          })
        });

        const data = await response.json();
        messageEl.textContent = data.message;
        messageEl.className = response.ok ? "success" : "error";

      } catch (err) {
        messageEl.textContent = "Something went wrong. Try again.";
        messageEl.className = "error";
      }
    }
  </script>

</body>
</html>
